; PHP-FPM Pool Configuration for Al-Fateeh

[www]
user = www-data
group = www-data

; Listen on TCP socket (for nginx within same container)
listen = 127.0.0.1:9000

; Process management
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 500

; Timeouts
request_terminate_timeout = 60s

; Logging
access.log = /proc/self/fd/2
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; Environment variables
clear_env = no
